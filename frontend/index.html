<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jarvis — Your AI-powered personal assistant">
    <title>Jarvis — AI Assistant</title>
    <link rel="shortcut icon" href="/assets/img/logo.ico" type="image/x-icon">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
      .subtitle-text { font-size: 0.9rem; color: var(--text-muted); }
    </style>
  </head>

  <body>
    <div class="chat-wrapper">

      <!-- ── Header ─────────────────────────────────────────────────────────── -->
      <header class="chat-header">
        <div class="header-brand">
          <span class="brand-text">JARVIS</span>
          <div class="status-indicator">
            <div id="status-dot"></div>
            <span id="status-text">Ready</span>
          </div>
        </div>
        <div class="header-actions">
          <a href="monitor.html" class="icon-btn" title="Performance Monitor" aria-label="Performance Monitor">
            <i class="bi bi-speedometer2"></i>
          </a>
          <button type="button" class="icon-btn" title="Settings" data-bs-toggle="modal" data-bs-target="#settingsModal" aria-label="Settings">
            <i class="bi bi-gear-wide-connected"></i>
          </button>
        </div>
      </header>

      <!-- ── Main Chat Area ─────────────────────────────────────────────────── -->
      <main class="chat-body" id="chat-canvas-body">

        <!-- Welcome Message -->
        <div class="welcome-container text-center">
          <h1 id="WishMessage">Initializing...</h1>
          <p class="subtitle-text">Ask me anything, <span id="userName">User</span>.</p>
        </div>



        <!-- Typing indicator -->
        <div id="typing-indicator" style="display:none">
          <span></span><span></span><span></span>
        </div>

      </main>

      <!-- ── Input Area ─────────────────────────────────────────────────────── -->
      <footer class="chat-footer">
        <div class="input-container">
          <input
            type="text"
            id="chatbox"
            name="chatbox"
            placeholder="Message Jarvis..."
            autocomplete="off"
            class="chat-input"
          >
          <button type="button" id="MicBtn" class="action-btn mic-btn" title="Voice command" aria-label="Voice command">
            <i class="bi bi-mic-fill"></i>
          </button>
          <button type="button" id="SendBtn" class="action-btn send-btn" title="Send message" aria-label="Send message" hidden>
            <i class="bi bi-send-fill"></i>
          </button>
        </div>
      </footer>

    </div>

    <!-- ── Settings Modal ──────────────────────────────────────────────────── -->
    <div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalLabel">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="settingsModalLabel">SETTINGS</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Assistant Name</label>
              <input type="text" class="form-control" id="settingAssistantName" value="Jarvis" readonly>
            </div>
            <div class="mb-3">
              <label class="form-label">Your Name</label>
              <input type="text" class="form-control" id="settingUserName" value="User" readonly>
            </div>
            <div class="mb-3">
              <label class="form-label">Theme</label>
              <select class="form-select" id="settingAccent">
                <option value="#FFFFFF" selected>Pure White</option>
                <option value="#AAAAAA">Silver</option>
                <option value="#555555">Charcoal</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" id="applySettingsBtn" class="btn btn-apply" data-bs-dismiss="modal">
              Apply
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Scripts ────────────────────────────────────────────────────────── -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="/eel.js"></script>
    <script src="main.js"></script>
    <script src="controller.js"></script>
  </body>
</html>
