<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jarvis — Authentication</title>
  <link rel="shortcut icon" href="/assets/img/logo.ico" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-wrapper {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: var(--bg-primary);
    }
    .auth-card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(255,255,255,0.02);
    }
    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 24px;
      text-align: center;
      letter-spacing: 1px;
    }
    .auth-input {
      background-color: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      margin-bottom: 16px;
      width: 100%;
      outline: none;
      transition: border-color var(--transition);
    }
    .auth-input:focus {
      border-color: var(--text-muted);
    }
    .auth-btn {
      background-color: var(--text-primary);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius-md);
      padding: 12px;
      width: 100%;
      font-weight: 600;
      cursor: pointer;
      transition: opacity var(--transition);
      margin-bottom: 12px;
    }
    .auth-btn:hover {
      opacity: 0.9;
    }
    .auth-btn-outline {
      background-color: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px;
      width: 100%;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }
    .auth-btn-outline:hover {
      border-color: var(--text-primary);
      background-color: var(--bg-input);
    }
    .auth-switch {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 16px;
      cursor: pointer;
    }
    .auth-switch:hover {
      color: var(--text-primary);
    }
    .error-msg {
      color: #ff5555;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 16px;
      min-height: 20px;
    }
    .auth-or-divider {
      text-align: center;
      margin: 16px 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .face-auth-container {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card" id="loginCard">
      <div class="auth-title">JARVIS LOGIN</div>
      <div id="loginError" class="error-msg"></div>
      <input type="text" id="loginUsername" class="auth-input" placeholder="Username">
      <input type="password" id="loginPassword" class="auth-input" placeholder="Password" autocomplete="current-password">
      <button type="button" id="loginBtn" class="auth-btn">LOGIN</button>

      <div class="auth-or-divider">OR</div>

      <button type="button" id="faceAuthBtn" class="auth-btn-outline"><i class="bi bi-person-bounding-box"></i> Login with Face</button>

      <div class="auth-switch" id="goToSignup">Don't have an account? Sign up</div>


    </div>

    <div class="auth-card" id="signupCard" hidden>
      <div class="auth-title">CREATE ACCOUNT</div>
      <div id="signupError" class="error-msg"></div>
      <input type="text" id="signupUsername" class="auth-input" placeholder="Username">
      <input type="email" id="signupEmail" class="auth-input" placeholder="Email">
      <input type="password" id="signupPassword" class="auth-input" placeholder="Password" autocomplete="new-password">
      <button type="button" id="signupBtn" class="auth-btn">SIGN UP</button>
      <div class="auth-switch" id="goToLogin">Already have an account? Login</div>
    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="/eel.js"></script>
  <script src="auth.js"></script>
</body>
</html>
