<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jarvis Monitoring Dashboard — Track API usage, performance, and errors.">
    <title>Jarvis — Monitor</title>
    <link rel="shortcut icon" href="/assets/img/logo.ico" type="image/x-icon">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <!-- Eel -->
    <script src="/eel.js"></script>

    <style>
      /* ── Design Tokens ────────────────────────────────────────────────────── */
      :root {
        --bg-primary:    #000000;
        --bg-secondary:  #111111;
        --bg-card:       #0a0a0a;
        --accent:        #FFFFFF;
        --accent-dim:    rgba(255, 255, 255, 0.1);
        --text-primary:  #FFFFFF;
        --text-muted:    #888888;
        --border:        #333333;
        --radius-sm:     8px;
        --radius-md:     14px;
        --radius-lg:     24px;
        --transition:    0.2s ease-in-out;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

      /* ── HUD Top Bar ────────────────────────────────────────────────────── */
      .hud-bar {
        position: sticky; top: 0; z-index: 100;
        height: 56px;
        background: var(--bg-primary);
        border-bottom: 1px solid var(--border);
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 28px;
      }

      .hud-brand {
        font-size: 1.1rem; font-weight: 700;
        color: var(--accent);
        letter-spacing: 1px;
        display: flex; align-items: center; gap: 10px;
      }

      .hud-brand .badge {
        font-size: 0.7rem; font-weight: 600;
        background: var(--bg-secondary);
        color: var(--text-muted);
        border: 1px solid var(--border);
        padding: 4px 8px;
        border-radius: var(--radius-sm);
        letter-spacing: 1px;
      }

      .hud-back {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.9rem;
        display: flex; align-items: center; gap: 6px;
        transition: color var(--transition);
      }
      .hud-back:hover { color: var(--accent); }

      .hud-actions {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .hud-time {
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      /* ── Dashboard Grid ─────────────────────────────────────────────────── */
      .dashboard {
        max-width: 1200px;
        margin: 0 auto;
        padding: 32px 20px 60px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 24px;
      }

      @media (max-width: 900px)  { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 500px)  { .stats-grid { grid-template-columns: 1fr; } }

      .charts-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 16px;
        margin-bottom: 24px;
      }

      @media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }

      .full-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 24px;
      }

      @media (max-width: 800px) { .full-row { grid-template-columns: 1fr; } }

      /* ── Cards ───────────────────────────────────────────────────────────── */
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 20px;
        transition: border-color var(--transition);
      }

      .card:hover {
        border-color: var(--text-muted);
      }

      .stat-card {
        display: flex; flex-direction: column; gap: 8px;
      }

      .stat-card .stat-label {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .stat-card .stat-value {
        font-size: 2rem;
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
      }

      .stat-card .stat-sub {
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      .stat-card .stat-icon {
        font-size: 1.2rem;
        margin-bottom: 4px;
        color: var(--text-muted);
      }

      /* ── Chart cards ────────────────────────────────────────────────────── */
      .card-title {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 1px;
        margin-bottom: 16px;
        display: flex; align-items: center; gap: 8px;
        text-transform: uppercase;
      }

      .chart-container {
        position: relative;
        height: 220px;
      }

      /* ── Tables ──────────────────────────────────────────────────────────── */
      .log-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 0.85rem;
      }

      .log-table th {
        font-size: 0.7rem;
        color: var(--text-muted);
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        text-align: left;
      }

      .log-table td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--bg-secondary);
        vertical-align: middle;
      }

      .log-table tr:hover td {
        background: var(--bg-secondary);
      }

      .badge-ok, .badge-fail, .badge-warn {
        background: var(--bg-secondary);
        color: var(--text-primary);
        padding: 4px 8px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 0.7rem;
        font-weight: 500;
      }

      .log-table .svc-name {
        color: var(--accent);
        font-weight: 500;
      }

      .log-table .ts {
        color: var(--text-muted);
      }

      .table-scroll {
        max-height: 280px;
        overflow-y: auto;
      }

      /* ── Loading state ──────────────────────────────────────────────────── */
      .loading {
        display: flex; align-items: center; justify-content: center;
        min-height: 200px;
        color: var(--text-muted);
        font-size: 0.85rem;
        letter-spacing: 1px;
      }

      @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
      .loading { animation: pulse 1.5s infinite; }

      /* ── Refresh button ─────────────────────────────────────────────────── */
      .refresh-btn {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        color: var(--text-primary);
        padding: 6px 16px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 500;
        display: flex; align-items: center; gap: 6px;
        transition: all var(--transition);
      }
      .refresh-btn:hover {
        background: var(--text-primary);
        color: var(--bg-primary);
      }
      .refresh-btn.spinning i { animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <!-- ── HUD Bar ──────────────────────────────────────────────────────── -->
    <div class="hud-bar">
      <div class="hud-brand">
        JARVIS <span class="badge">MONITOR</span>
      </div>
      <div class="hud-actions">
        <span id="hud-time" class="hud-time"></span>
        <button type="button" class="refresh-btn" id="refreshBtn" onclick="refreshData()">
          <i class="bi bi-arrow-clockwise"></i> REFRESH
        </button>
        <a href="index.html" class="hud-back">
          <i class="bi bi-arrow-left"></i> Back
        </a>
      </div>
    </div>

    <!-- ── Dashboard ────────────────────────────────────────────────────── -->
    <div class="dashboard">

      <!-- ── Stat Cards ───────────────────────────────────────────────── -->
      <div class="stats-grid">
        <div class="card stat-card" id="card-total">
          <span class="stat-icon"><i class="bi bi-bar-chart-fill"></i></span>
          <span class="stat-label">API CALLS TODAY</span>
          <span class="stat-value" id="stat-total">--</span>
          <span class="stat-sub" id="stat-total-sub"></span>
        </div>
        <div class="card stat-card" id="card-success">
          <span class="stat-icon"><i class="bi bi-check-circle-fill"></i></span>
          <span class="stat-label">SUCCESS RATE</span>
          <span class="stat-value" id="stat-success">--</span>
          <span class="stat-sub" id="stat-success-sub"></span>
        </div>
        <div class="card stat-card" id="card-latency">
          <span class="stat-icon"><i class="bi bi-lightning-fill"></i></span>
          <span class="stat-label">AVG LATENCY</span>
          <span class="stat-value" id="stat-latency">--</span>
          <span class="stat-sub">milliseconds</span>
        </div>
        <div class="card stat-card" id="card-tokens">
          <span class="stat-icon"><i class="bi bi-cpu-fill"></i></span>
          <span class="stat-label">TOKENS USED</span>
          <span class="stat-value" id="stat-tokens">--</span>
          <span class="stat-sub">today</span>
        </div>
      </div>

      <!-- ── Charts Row ───────────────────────────────────────────────── -->
      <div class="charts-grid">
        <div class="card">
          <div class="card-title"><i class="bi bi-graph-up"></i> WEEKLY USAGE</div>
          <div class="chart-container">
            <canvas id="weeklyChart"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title"><i class="bi bi-pie-chart"></i> SERVICES</div>
          <div class="chart-container">
            <canvas id="serviceChart"></canvas>
          </div>
        </div>
      </div>

      <!-- ── Hourly + Errors Row ──────────────────────────────────────── -->
      <div class="full-row">
        <div class="card">
          <div class="card-title"><i class="bi bi-clock-history"></i> HOURLY ACTIVITY</div>
          <div class="chart-container">
            <canvas id="hourlyChart"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title"><i class="bi bi-exclamation-triangle"></i> RECENT ERRORS</div>
          <div class="table-scroll" id="error-table-container">
            <div class="loading">LOADING...</div>
          </div>
        </div>
      </div>

      <!-- ── Recent API Calls ─────────────────────────────────────────── -->
      <div class="card">
        <div class="card-title"><i class="bi bi-journal-text"></i> RECENT API CALLS</div>
        <div class="table-scroll" id="calls-table-container">
          <div class="loading">LOADING...</div>
        </div>
      </div>
    </div>

    <!-- ── Scripts ───────────────────────────────────────────────────────── -->
    <script>
      let weeklyChart, serviceChart, hourlyChart;

      // ── Chart.js global defaults (Grayscale) ────────────────────────────
      Chart.defaults.color = '#888888';
      Chart.defaults.borderColor = '#333333';
      Chart.defaults.font.family = "'Inter', sans-serif";
      Chart.defaults.font.size = 11;

      // ── Clock ───────────────────────────────────────────────────────────
      function updateClock() {
        const now = new Date();
        const t = now.toLocaleTimeString('en-US', { hour12: false });
        const d = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        document.getElementById('hud-time').textContent = `${d}  ${t}`;
      }
      setInterval(updateClock, 1000);
      updateClock();

      // ── Refresh ─────────────────────────────────────────────────────────
      async function refreshData() {
        const btn = document.getElementById('refreshBtn');
        btn.classList.add('spinning');

        try {
          const data = await eel.getMonitorStats()();
          renderDashboard(data);
        } catch (err) {
          console.error('Failed to fetch monitor stats:', err);
        } finally {
          setTimeout(() => btn.classList.remove('spinning'), 600);
        }
      }

      function renderDashboard(data) {
        if (!data) return;
        renderStatCards(data.daily);
        renderWeeklyChart(data.weekly);
        renderServiceChart(data.services);
        renderHourlyChart(data.hourly);
        renderErrorTable(data.recent_errors);
        renderCallsTable(data.recent_calls);
      }

      function renderStatCards(daily) {
        if (!daily) return;
        const total = daily.total_calls || 0;
        const ok = daily.successful_calls || 0;
        const fail = daily.failed_calls || 0;
        const rate = total > 0 ? ((ok / total) * 100).toFixed(1) : '100';

        document.getElementById('stat-total').textContent = total.toLocaleString();
        document.getElementById('stat-total-sub').textContent = `${ok} ok / ${fail} failed`;
        document.getElementById('stat-success').textContent = `${rate}%`;
        document.getElementById('stat-success-sub').textContent = `${ok} of ${total} calls`;
        document.getElementById('stat-latency').textContent = (daily.avg_latency_ms || 0).toLocaleString();
        document.getElementById('stat-tokens').textContent = (daily.total_tokens || 0).toLocaleString();
      }

      function renderWeeklyChart(weekly) {
        const ctx = document.getElementById('weeklyChart').getContext('2d');
        const labels = (weekly || []).map(d => d.date.slice(5)).reverse();
        const okData = (weekly || []).map(d => d.successful_calls).reverse();
        const failData = (weekly || []).map(d => d.failed_calls).reverse();

        if (weeklyChart) weeklyChart.destroy();

        weeklyChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels,
            datasets: [
              {
                label: 'Successful',
                data: okData,
                backgroundColor: '#ffffff',
                borderWidth: 0,
                borderRadius: 4,
              },
              {
                label: 'Failed',
                data: failData,
                backgroundColor: '#555555',
                borderWidth: 0,
                borderRadius: 4,
              },
            ],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'top', labels: { boxWidth: 12, padding: 16 } } },
            scales: { x: { grid: { display: false } }, y: { beginAtZero: true, ticks: { stepSize: 1 } } },
          },
        });
      }

      function renderServiceChart(services) {
        const ctx = document.getElementById('serviceChart').getContext('2d');
        const labels = (services || []).map(s => s.service);
        const values = (services || []).map(s => s.calls);
        // Grayscale colors
        const colors = ['#ffffff', '#cccccc', '#999999', '#666666', '#333333', '#111111'];

        if (serviceChart) serviceChart.destroy();

        serviceChart = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels,
            datasets: [{
              data: values,
              backgroundColor: colors.slice(0, labels.length),
              borderColor: '#0a0a0a',
              borderWidth: 2,
            }],
          },
          options: {
            responsive: true, maintainAspectRatio: false, cutout: '65%',
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 12, font: { size: 10 } } } },
          },
        });
      }

      function renderHourlyChart(hourly) {
        const ctx = document.getElementById('hourlyChart').getContext('2d');
        const labels = (hourly || []).map(h => `${String(h.hour).padStart(2, '0')}:00`);
        const values = (hourly || []).map(h => h.calls);

        if (hourlyChart) hourlyChart.destroy();

        hourlyChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels,
            datasets: [{
              label: 'Calls',
              data: values,
              backgroundColor: values.map(v => v > 0 ? '#cccccc' : '#222222'),
              borderWidth: 0,
              borderRadius: 3,
            }],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { grid: { display: false } }, y: { beginAtZero: true, ticks: { stepSize: 1 } } },
          },
        });
      }

      function renderErrorTable(errors) {
        const container = document.getElementById('error-table-container');
        if (!errors || errors.length === 0) {
          container.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:0.85rem;">No errors recorded. All systems operational.</div>';
          return;
        }

        let html = '<table class="log-table"><thead><tr><th>TIME</th><th>SOURCE</th><th>SEVERITY</th><th>MESSAGE</th></tr></thead><tbody>';
        for (const e of errors) {
          const sev = e.severity || 'error';
          const ts = (e.timestamp || '').slice(11, 19);
          html += `<tr>
            <td class="ts">${ts}</td>
            <td class="svc-name">${e.source}</td>
            <td><span class="badge-fail">${sev.toUpperCase()}</span></td>
            <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(e.error_msg || '')}</td>
          </tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
      }

      function renderCallsTable(calls) {
        const container = document.getElementById('calls-table-container');
        if (!calls || calls.length === 0) {
          container.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:0.85rem;">No API calls recorded yet.</div>';
          return;
        }

        let html = '<table class="log-table"><thead><tr><th>TIME</th><th>SERVICE</th><th>MODEL</th><th>LATENCY</th><th>TOKENS</th><th>STATUS</th></tr></thead><tbody>';
        for (const c of calls) {
          const ts = (c.timestamp || '').slice(11, 19);
          const badge = c.success ? '<span class="badge-ok">OK</span>' : '<span class="badge-fail">FAIL</span>';
          html += `<tr>
            <td class="ts">${ts}</td>
            <td class="svc-name">${c.service}</td>
            <td>${c.model || '—'}</td>
            <td>${c.latency_ms ? c.latency_ms + 'ms' : '—'}</td>
            <td>${c.tokens_used || '—'}</td>
            <td>${badge}</td>
          </tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
      }

      function escapeHtml(str) {
        const div = document.createElement('div'); div.textContent = str; return div.innerHTML;
      }

      setInterval(refreshData, 30000);
      window.addEventListener('load', () => { setTimeout(refreshData, 500); });
    </script>
  </body>
</html>
