<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jarvis Monitoring Dashboard — Track API usage, performance, and errors." />
    <title>Jarvis — Monitor</title>
    <link rel="shortcut icon" href="/frontend/assets/img/logo.ico" type="image/x-icon" />

    <!-- Google Fonts (same as main UI) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <!-- Eel -->
    <script type="text/javascript" src="/eel.js"></script>

    <style>
      /* ── Design Tokens (matching main Jarvis UI) ────────────────────────── */
      :root {
        --bg-primary:    #020408;
        --bg-secondary:  #080f1a;
        --bg-card:       rgba(8, 20, 40, 0.65);
        --accent:        #00aaff;
        --accent-dim:    rgba(0, 170, 255, 0.15);
        --accent-glow:   rgba(0, 170, 255, 0.4);
        --accent2:       #0048ff;
        --danger:        #ff2d55;
        --warning:       #ff9f0a;
        --success:       #30d158;
        --purple:        #bf5af2;
        --text-primary:  #e8f4ff;
        --text-muted:    #5a7a99;
        --border:        rgba(0, 170, 255, 0.2);
        --radius-sm:     8px;
        --radius-md:     14px;
        --radius-lg:     20px;
        --transition:    0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        background-image:
          radial-gradient(ellipse at 20% 50%, rgba(0, 72, 255, 0.06) 0%, transparent 60%),
          radial-gradient(ellipse at 80% 20%, rgba(0, 170, 255, 0.05) 0%, transparent 50%);
        animation: pageLoad 0.6s ease-out;
      }

      @keyframes pageLoad {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Scanline overlay */
      body::after {
        content: '';
        position: fixed; inset: 0;
        pointer-events: none; z-index: 9999;
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,170,255,0.012) 2px, rgba(0,170,255,0.012) 4px);
      }

      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

      /* ── HUD Top Bar ────────────────────────────────────────────────────── */
      .hud-bar {
        position: sticky; top: 0; z-index: 100;
        height: 48px;
        background: rgba(2, 4, 8, 0.9);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--border);
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 28px;
      }

      .hud-brand {
        font-family: 'Orbitron', sans-serif;
        font-size: 14px; font-weight: 700;
        color: var(--accent);
        letter-spacing: 3px;
        text-shadow: 0 0 10px var(--accent-glow);
        display: flex; align-items: center; gap: 10px;
      }

      .hud-brand .badge {
        font-family: 'Inter', sans-serif;
        font-size: 10px; font-weight: 600;
        background: var(--accent-dim);
        color: var(--accent);
        border: 1px solid var(--border);
        padding: 2px 10px;
        border-radius: 20px;
        letter-spacing: 1px;
      }

      .hud-back {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 13px;
        display: flex; align-items: center; gap: 6px;
        transition: color var(--transition);
      }
      .hud-back:hover { color: var(--accent); }

      /* ── Dashboard Grid ─────────────────────────────────────────────────── */
      .dashboard {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 20px 60px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 24px;
      }

      @media (max-width: 900px)  { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 500px)  { .stats-grid { grid-template-columns: 1fr; } }

      .charts-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 16px;
        margin-bottom: 24px;
      }

      @media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }

      .full-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 24px;
      }

      @media (max-width: 800px) { .full-row { grid-template-columns: 1fr; } }

      /* ── Cards ───────────────────────────────────────────────────────────── */
      .card {
        background: var(--bg-card);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 20px;
        transition: border-color var(--transition), box-shadow var(--transition);
      }

      .card:hover {
        border-color: rgba(0, 170, 255, 0.4);
        box-shadow: 0 4px 24px rgba(0, 170, 255, 0.08);
      }

      .stat-card {
        display: flex; flex-direction: column; gap: 8px;
      }

      .stat-card .stat-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }

      .stat-card .stat-value {
        font-family: 'Orbitron', sans-serif;
        font-size: 28px;
        font-weight: 700;
        color: var(--accent);
        text-shadow: 0 0 12px var(--accent-glow);
        line-height: 1;
      }

      .stat-card .stat-sub {
        font-size: 12px;
        color: var(--text-muted);
      }

      .stat-card .stat-icon {
        font-size: 18px;
        margin-bottom: 4px;
      }

      .stat-card.danger .stat-value { color: var(--danger); text-shadow: 0 0 12px rgba(255,45,85,0.4); }
      .stat-card.success .stat-value { color: var(--success); text-shadow: 0 0 12px rgba(48,209,88,0.4); }
      .stat-card.warning .stat-value { color: var(--warning); text-shadow: 0 0 12px rgba(255,159,10,0.4); }
      .stat-card.purple .stat-value { color: var(--purple); text-shadow: 0 0 12px rgba(191,90,242,0.4); }

      /* ── Chart cards ────────────────────────────────────────────────────── */
      .card-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 12px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 2px;
        margin-bottom: 16px;
        display: flex; align-items: center; gap: 8px;
      }

      .chart-container {
        position: relative;
        height: 220px;
      }

      /* ── Tables ──────────────────────────────────────────────────────────── */
      .log-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 12px;
      }

      .log-table th {
        font-family: 'Orbitron', sans-serif;
        font-size: 10px;
        color: var(--text-muted);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        text-align: left;
      }

      .log-table td {
        padding: 8px 12px;
        border-bottom: 1px solid rgba(0,170,255,0.06);
        vertical-align: middle;
      }

      .log-table tr:hover td {
        background: rgba(0, 170, 255, 0.04);
      }

      .log-table .badge-ok {
        background: rgba(48,209,88,0.15);
        color: var(--success);
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 600;
      }

      .log-table .badge-fail {
        background: rgba(255,45,85,0.15);
        color: var(--danger);
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 600;
      }

      .log-table .badge-warn {
        background: rgba(255,159,10,0.15);
        color: var(--warning);
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 600;
      }

      .log-table .svc-name {
        color: var(--accent);
        font-weight: 600;
      }

      .log-table .ts {
        color: var(--text-muted);
        font-size: 11px;
      }

      .table-scroll {
        max-height: 280px;
        overflow-y: auto;
      }

      /* ── Loading state ──────────────────────────────────────────────────── */
      .loading {
        display: flex; align-items: center; justify-content: center;
        min-height: 200px;
        color: var(--text-muted);
        font-family: 'Orbitron', sans-serif;
        font-size: 12px;
        letter-spacing: 2px;
      }

      @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
      .loading { animation: pulse 1.5s infinite; }

      /* ── Refresh button ─────────────────────────────────────────────────── */
      .refresh-btn {
        background: var(--accent-dim);
        border: 1px solid var(--border);
        color: var(--accent);
        padding: 6px 16px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        display: flex; align-items: center; gap: 6px;
        transition: all var(--transition);
      }
      .refresh-btn:hover {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 0 14px var(--accent-glow);
      }
      .refresh-btn.spinning i { animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <!-- ── HUD Bar ──────────────────────────────────────────────────────── -->
    <div class="hud-bar">
      <div class="hud-brand">
        JARVIS <span class="badge">MONITOR</span>
      </div>
      <div style="display:flex; align-items:center; gap:16px;">
        <span id="hud-time" style="font-size:12px; color:var(--text-muted); letter-spacing:1px;"></span>
        <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
          <i class="bi bi-arrow-clockwise"></i> REFRESH
        </button>
        <a href="index.html" class="hud-back">
          <i class="bi bi-arrow-left"></i> Back to Jarvis
        </a>
      </div>
    </div>

    <!-- ── Dashboard ────────────────────────────────────────────────────── -->
    <div class="dashboard">

      <!-- ── Stat Cards ───────────────────────────────────────────────── -->
      <div class="stats-grid">
        <div class="card stat-card" id="card-total">
          <span class="stat-icon">&#128202;</span>
          <span class="stat-label">API CALLS TODAY</span>
          <span class="stat-value" id="stat-total">--</span>
          <span class="stat-sub" id="stat-total-sub"></span>
        </div>
        <div class="card stat-card success" id="card-success">
          <span class="stat-icon">&#9989;</span>
          <span class="stat-label">SUCCESS RATE</span>
          <span class="stat-value" id="stat-success">--</span>
          <span class="stat-sub" id="stat-success-sub"></span>
        </div>
        <div class="card stat-card warning" id="card-latency">
          <span class="stat-icon">&#9889;</span>
          <span class="stat-label">AVG LATENCY</span>
          <span class="stat-value" id="stat-latency">--</span>
          <span class="stat-sub">milliseconds</span>
        </div>
        <div class="card stat-card purple" id="card-tokens">
          <span class="stat-icon">&#129520;</span>
          <span class="stat-label">TOKENS USED</span>
          <span class="stat-value" id="stat-tokens">--</span>
          <span class="stat-sub">today</span>
        </div>
      </div>

      <!-- ── Charts Row ───────────────────────────────────────────────── -->
      <div class="charts-grid">
        <div class="card">
          <div class="card-title"><i class="bi bi-graph-up"></i> WEEKLY USAGE</div>
          <div class="chart-container">
            <canvas id="weeklyChart"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title"><i class="bi bi-pie-chart"></i> SERVICES</div>
          <div class="chart-container">
            <canvas id="serviceChart"></canvas>
          </div>
        </div>
      </div>

      <!-- ── Hourly + Errors Row ──────────────────────────────────────── -->
      <div class="full-row">
        <div class="card">
          <div class="card-title"><i class="bi bi-clock-history"></i> HOURLY ACTIVITY</div>
          <div class="chart-container">
            <canvas id="hourlyChart"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title"><i class="bi bi-exclamation-triangle"></i> RECENT ERRORS</div>
          <div class="table-scroll" id="error-table-container">
            <div class="loading">LOADING...</div>
          </div>
        </div>
      </div>

      <!-- ── Recent API Calls ─────────────────────────────────────────── -->
      <div class="card">
        <div class="card-title"><i class="bi bi-journal-text"></i> RECENT API CALLS</div>
        <div class="table-scroll" id="calls-table-container">
          <div class="loading">LOADING...</div>
        </div>
      </div>
    </div>

    <!-- ── Scripts ───────────────────────────────────────────────────────── -->
    <script>
      // ── Chart instances ─────────────────────────────────────────────────
      let weeklyChart, serviceChart, hourlyChart;

      // ── Chart.js global defaults ────────────────────────────────────────
      Chart.defaults.color = '#5a7a99';
      Chart.defaults.borderColor = 'rgba(0,170,255,0.1)';
      Chart.defaults.font.family = "'Inter', sans-serif";
      Chart.defaults.font.size = 11;

      // ── Clock ───────────────────────────────────────────────────────────
      function updateClock() {
        const now = new Date();
        const t = now.toLocaleTimeString('en-US', { hour12: false });
        const d = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        document.getElementById('hud-time').textContent = `${d}  ${t}`;
      }
      setInterval(updateClock, 1000);
      updateClock();

      // ── Refresh ─────────────────────────────────────────────────────────
      async function refreshData() {
        const btn = document.getElementById('refreshBtn');
        btn.classList.add('spinning');

        try {
          const data = await eel.getMonitorStats()();
          renderDashboard(data);
        } catch (err) {
          console.error('Failed to fetch monitor stats:', err);
        } finally {
          setTimeout(() => btn.classList.remove('spinning'), 600);
        }
      }

      // ── Render Dashboard ────────────────────────────────────────────────
      function renderDashboard(data) {
        if (!data) return;
        renderStatCards(data.daily);
        renderWeeklyChart(data.weekly);
        renderServiceChart(data.services);
        renderHourlyChart(data.hourly);
        renderErrorTable(data.recent_errors);
        renderCallsTable(data.recent_calls);
      }

      // ── Stat Cards ──────────────────────────────────────────────────────
      function renderStatCards(daily) {
        if (!daily) return;

        const total = daily.total_calls || 0;
        const ok = daily.successful_calls || 0;
        const fail = daily.failed_calls || 0;
        const rate = total > 0 ? ((ok / total) * 100).toFixed(1) : '100';

        document.getElementById('stat-total').textContent = total.toLocaleString();
        document.getElementById('stat-total-sub').textContent = `${ok} ok / ${fail} failed`;

        document.getElementById('stat-success').textContent = `${rate}%`;
        document.getElementById('stat-success-sub').textContent = `${ok} of ${total} calls`;

        document.getElementById('stat-latency').textContent = (daily.avg_latency_ms || 0).toLocaleString();
        document.getElementById('stat-tokens').textContent = (daily.total_tokens || 0).toLocaleString();
      }

      // ── Weekly Chart ────────────────────────────────────────────────────
      function renderWeeklyChart(weekly) {
        const ctx = document.getElementById('weeklyChart').getContext('2d');
        const labels = (weekly || []).map(d => d.date.slice(5)).reverse(); // "06-01"
        const okData = (weekly || []).map(d => d.successful_calls).reverse();
        const failData = (weekly || []).map(d => d.failed_calls).reverse();

        if (weeklyChart) weeklyChart.destroy();

        weeklyChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels,
            datasets: [
              {
                label: 'Successful',
                data: okData,
                backgroundColor: 'rgba(0, 170, 255, 0.6)',
                borderColor: '#00aaff',
                borderWidth: 1,
                borderRadius: 4,
              },
              {
                label: 'Failed',
                data: failData,
                backgroundColor: 'rgba(255, 45, 85, 0.6)',
                borderColor: '#ff2d55',
                borderWidth: 1,
                borderRadius: 4,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: 'top', labels: { boxWidth: 12, padding: 16 } } },
            scales: {
              x: { grid: { display: false } },
              y: { beginAtZero: true, ticks: { stepSize: 1 } },
            },
          },
        });
      }

      // ── Service Doughnut ────────────────────────────────────────────────
      function renderServiceChart(services) {
        const ctx = document.getElementById('serviceChart').getContext('2d');
        const labels = (services || []).map(s => s.service);
        const values = (services || []).map(s => s.calls);
        const colors = ['#00aaff', '#30d158', '#ff9f0a', '#bf5af2', '#ff2d55', '#5ac8fa', '#ffcc00'];

        if (serviceChart) serviceChart.destroy();

        serviceChart = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels,
            datasets: [{
              data: values,
              backgroundColor: colors.slice(0, labels.length),
              borderColor: 'rgba(2,4,8,0.8)',
              borderWidth: 2,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '65%',
            plugins: {
              legend: { position: 'bottom', labels: { boxWidth: 10, padding: 12, font: { size: 10 } } },
            },
          },
        });
      }

      // ── Hourly Bar Chart ────────────────────────────────────────────────
      function renderHourlyChart(hourly) {
        const ctx = document.getElementById('hourlyChart').getContext('2d');
        const labels = (hourly || []).map(h => `${String(h.hour).padStart(2, '0')}:00`);
        const values = (hourly || []).map(h => h.calls);

        if (hourlyChart) hourlyChart.destroy();

        hourlyChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels,
            datasets: [{
              label: 'Calls',
              data: values,
              backgroundColor: values.map(v => v > 0 ? 'rgba(0, 170, 255, 0.5)' : 'rgba(0, 170, 255, 0.08)'),
              borderColor: values.map(v => v > 0 ? '#00aaff' : 'transparent'),
              borderWidth: 1,
              borderRadius: 3,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { grid: { display: false }, ticks: { maxRotation: 90, font: { size: 9 } } },
              y: { beginAtZero: true, ticks: { stepSize: 1 } },
            },
          },
        });
      }

      // ── Error Table ─────────────────────────────────────────────────────
      function renderErrorTable(errors) {
        const container = document.getElementById('error-table-container');
        if (!errors || errors.length === 0) {
          container.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:12px;">No errors recorded. All systems operational.</div>';
          return;
        }

        let html = '<table class="log-table"><thead><tr><th>TIME</th><th>SOURCE</th><th>SEVERITY</th><th>MESSAGE</th></tr></thead><tbody>';
        for (const e of errors) {
          const sev = e.severity || 'error';
          const badgeClass = sev === 'critical' ? 'badge-fail' : sev === 'warning' ? 'badge-warn' : 'badge-fail';
          const ts = (e.timestamp || '').slice(11, 19);
          html += `<tr>
            <td class="ts">${ts}</td>
            <td class="svc-name">${e.source}</td>
            <td><span class="${badgeClass}">${sev.toUpperCase()}</span></td>
            <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(e.error_msg || '')}</td>
          </tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
      }

      // ── Calls Table ─────────────────────────────────────────────────────
      function renderCallsTable(calls) {
        const container = document.getElementById('calls-table-container');
        if (!calls || calls.length === 0) {
          container.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:12px;">No API calls recorded yet. Start talking to Jarvis!</div>';
          return;
        }

        let html = '<table class="log-table"><thead><tr><th>TIME</th><th>SERVICE</th><th>MODEL</th><th>LATENCY</th><th>TOKENS</th><th>STATUS</th></tr></thead><tbody>';
        for (const c of calls) {
          const ts = (c.timestamp || '').slice(11, 19);
          const badge = c.success ? '<span class="badge-ok">OK</span>' : '<span class="badge-fail">FAIL</span>';
          html += `<tr>
            <td class="ts">${ts}</td>
            <td class="svc-name">${c.service}</td>
            <td>${c.model || '—'}</td>
            <td>${c.latency_ms ? c.latency_ms + 'ms' : '—'}</td>
            <td>${c.tokens_used || '—'}</td>
            <td>${badge}</td>
          </tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
      }

      // ── Utility ─────────────────────────────────────────────────────────
      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // ── Auto-refresh every 30 seconds ───────────────────────────────────
      setInterval(refreshData, 30000);

      // ── Initial load ────────────────────────────────────────────────────
      window.addEventListener('load', () => {
        setTimeout(refreshData, 500); // Wait for Eel connection
      });
    </script>
  </body>
</html>
